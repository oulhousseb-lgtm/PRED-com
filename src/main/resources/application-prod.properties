# ======================================================
# CONFIGURATION PRODUCTION - PRED
# ======================================================

# Mode production
spring.profiles.active=prod

# Base de données de production (à adapter)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/pred_db_prod?useSSL=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}

# Pool de connexions optimisé pour production
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000

# JPA - Validation uniquement (pas de création automatique)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging minimal
logging.level.root=WARN
logging.level.com.pred.pred_api=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# Email - Configuration réelle
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# JWT - Durée standard
jwt.expiration.ms=86400000
jwt.secret=${JWT_SECRET}

# Frontend URL
app.frontend.url=${FRONTEND_URL:https://pred.ma}

# Upload - Chemin absolu
file.upload-dir=${UPLOAD_DIR:/var/www/pred/uploads/}
file.max-size-mb=10

# Actuator - Restreint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Cache
spring.cache.type=redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}