# ======================================================
# CONFIGURATION DÉVELOPPEMENT - PRED
# ======================================================

# Mode développement
spring.profiles.active=dev

# Base de données de développement
spring.datasource.url=jdbc:mysql://localhost:3306/pred_db_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# JPA - Création automatique des tables
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging détaillé
logging.level.com.pred.pred_api=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type=trace

# Email - Désactivé en dev (utilisation de logs)
spring.mail.host=localhost
spring.mail.port=3025

# JWT - Durée plus courte en dev
jwt.expiration.ms=3600000

# Frontend URL
app.frontend.url=http://localhost:5173

# Désactiver les tâches planifiées
app.scheduled.enabled=false